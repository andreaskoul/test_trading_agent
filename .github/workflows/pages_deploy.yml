name: Deploy dashboard to GitHub Pages

# Phase Q: publishes docs/ from the `state` branch to GitHub Pages so
# the dashboard always reflects the latest cron-trade snapshot.
#
# Triggered automatically when paper_trade.yml pushes to state, plus a
# manual run button.
#
# Setup (one-time, in repo settings):
#   Settings -> Pages -> Source: GitHub Actions

on:
  push:
    branches: [state]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout state branch
        uses: actions/checkout@v4
        with:
          ref: state
          fetch-depth: 0       # need full history to read other branches

      - name: Refresh index.html from default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          # Pull the freshest index.html from the default branch (named
          # dynamically so this workflow keeps working whatever the repo's
          # default-branch happens to be — we don't have a `main` here).
          # If the file already exists on the state branch (it usually
          # does — inherited from the worktree create), this just refreshes
          # it. If the fetch fails for any reason, fall back to whatever
          # the state branch already has.
          git fetch origin "$DEFAULT_BRANCH" --depth=1 2>/dev/null || true
          if git cat-file -e "origin/$DEFAULT_BRANCH:docs/index.html" 2>/dev/null; then
            git show "origin/$DEFAULT_BRANCH:docs/index.html" > docs/index.html
            echo "Refreshed docs/index.html from origin/$DEFAULT_BRANCH"
          elif [ -f docs/index.html ]; then
            echo "Using docs/index.html already on state branch"
          else
            echo "::error::no docs/index.html anywhere; cannot deploy" >&2
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
