name: Deploy dashboard to GitHub Pages

# Phase Q: publishes docs/ from the `state` branch to GitHub Pages so
# the dashboard always reflects the latest cron-trade snapshot.
#
# Triggered automatically when paper_trade.yml pushes to state, plus a
# manual run button.
#
# Setup (one-time, in repo settings):
#   Settings -> Pages -> Source: GitHub Actions

on:
  push:
    branches: [state]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout state branch
        uses: actions/checkout@v4
        with:
          ref: state

      - name: Pull index.html from main (state branch only carries data)
        run: |
          set -euo pipefail
          git fetch origin main:main 2>/dev/null || true
          git checkout main -- docs/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
