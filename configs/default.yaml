# Default configuration for the DL+RL trading agent.
# Supports multi-asset training via the `data.assets` list.

data:
  # Multi-asset configuration. Each entry defines one instrument.
  # The shared encoder is pretrained on concatenated features from all assets;
  # per-asset PPO policies then specialise on each instrument's dynamics.
  assets:
    - symbol: "GC=F"
      fallback_symbols: ["GLD", "XAUUSD=X"]
      interval: "1d"
      raw_path: "data/raw/gc.parquet"
      features_path: "data/processed/features_gc.parquet"
      labels_path: "data/processed/labels_gc.parquet"
    - symbol: "SI=F"
      fallback_symbols: ["SLV"]
      interval: "1d"
      raw_path: "data/raw/si.parquet"
      features_path: "data/processed/features_si.parquet"
      labels_path: "data/processed/labels_si.parquet"
  start: "2005-01-01"
  end: "2025-12-31"
  # Phase G: exogenous macro series (off-by-default on the daily profile).
  # Aggressive profile enables them by listing symbols explicitly.
  macro_symbols: []
  macro_interval: "1d"
  mi_threshold: 0.0   # 0 disables the MI pruner

features:
  seq_len: 32
  warmup_bars: 252
  zscore_window: 252

triple_barrier:
  horizon: 20              # max bars in a trade
  rr_upper: 2.0            # take-profit = +2 * ATR
  rr_lower: 1.0            # stop-loss   = -1 * ATR
  atr_window: 14

cpcv:
  n_splits: 6
  n_test_splits: 2
  embargo_pct: 0.01

encoder:
  hidden_size: 128
  n_slstm: 2
  n_mlstm: 2
  dropout: 0.3
  softcap: 15.0
  pretrain_epochs: 5
  pretrain_lr: 3.0e-4
  pretrain_batch: 128
  focal_gamma: 2.0
  vib: false            # Variational Information Bottleneck head
  vib_beta: 1.0e-3      # KL weight when vib: true
  tft: false            # TFT-style attention aggregator on xLSTM sequence
  tft_heads: 4
  # Phase G / iter-6 multi-task pretraining (off on the daily profile).
  multitask: false
  vol_weight: 0.3
  meta_weight: 0.2

ppo:
  total_timesteps: 60000   # budget per seed/path (fast default)
  n_steps: 1024
  batch_size: 128
  gae_lambda: 0.95
  gamma: 0.99
  ent_coef: 0.01
  clip_range: 0.2
  learning_rate: 3.0e-4
  curriculum:
    calm_frac: 0.3
    mixed_frac: 0.3
    # full = remaining 0.4
  seeds: [7, 13, 29, 53, 97]
  algorithms: ["ppo", "a2c", "recurrent_ppo"]  # T2.2 algo-diverse ensemble

env:
  seq_len: 32
  spread_bps: 2.0
  use_embedding: true      # if true, obs is 128-dim encoder embedding
  reward_tp: 2.0           # legacy shaped-reward TP magnitude
  reward_sl: -1.0          # legacy shaped-reward SL magnitude
  # --- Tier 1 reward knobs ---
  # reward_mode:
  #   "shaped"     -> legacy fixed +/-signal (baseline for ablation)
  #   "return"     -> T1.2 return-proportional with cost penalty
  #   "diff_sharpe"-> T1.3 Moody-Saffell differential Sharpe increment
  reward_mode: "return"
  reward_return_scale: 100.0   # scales ~1% returns into ~1.0 reward magnitude
  reward_cost_lambda: 3.0      # extra turnover penalty (3x realised spread)
  reward_dsr_eta: 0.01         # EWMA rate for DSR moments (diff_sharpe only)
  reward_dsr_scale: 1.0        # scale on differential Sharpe increment

evaluation:
  costs_bps: [0.0, 1.0, 2.0, 5.0, 10.0]
  bootstrap_resamples: 2000
  bootstrap_block_size: 20
  permutation_samples: 1000

finetune:
  timesteps: 20000
  lr: 1.0e-4
  ent_coef: 0.003
  holdout_frac: 0.2

artefact_dir: "artefacts"
report_dir: "reports"

kill_switch:
  enabled: true
  sharpe_floor: 1.0
  sharpe_window: 60            # trades
  sharpe_duration_bars: 3
  max_drawdown: 0.05
  win_rate_floor: 0.5
  win_rate_window: 100
  catastrophe_pct: 0.05

auto:
  # Tier 6 scheduler knobs (used by scripts/99_auto.py).
  retrain_every_days: 30       # full encoder + PPO retrain cadence
  finetune_every_days: 7       # small-lr holdout refinement cadence
  evaluate_every_days: 1       # re-run evaluate + regenerate reports
  min_new_bars_before_retrain: 500   # skip retrain if not enough new data

ui:
  port: 8765
  host: "0.0.0.0"
  paper:
    default_asset: "GC=F"
    costs:
      spread_bps: 2.0
      slippage_bps: 0.5
      commission_usd: 0.0
    bar_interval_seconds: 60
    meta_threshold: 0.55
  explain:
    model: "claude-opus-4-7"
    max_words: 120
  db_path: "artefacts/paper_trades.db"
